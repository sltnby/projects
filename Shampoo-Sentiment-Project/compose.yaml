version: "3"

services:
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: namenode
    hostname: namenode
    networks:
      - bigdata-net
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      - CLUSTER_NAME=Big-Data-Cluster
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    volumes:
      - hadoop_namenode:/hadoop/dfs/name

  # --- DATANODE 1 ---
  datanode1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: datanode1
    networks:
      - bigdata-net
    environment:
      - SERVICE_PRECONDITION=namenode:9870
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    depends_on:
      - namenode
    volumes:
      - hadoop_datanode_1:/hadoop/dfs/data  

  # --- DATANODE 2 ---
  datanode2:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: datanode2
    networks:
      - bigdata-net
    environment:
      - SERVICE_PRECONDITION=namenode:9870
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    depends_on:
      - namenode
    volumes:
      - hadoop_datanode_2:/hadoop/dfs/data  

  # --- DATANODE 3 ---
  datanode3:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    platform: linux/amd64
    container_name: datanode3
    networks:
      - bigdata-net
    environment:
      - SERVICE_PRECONDITION=namenode:9870
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    depends_on:
      - namenode
    volumes:
      - hadoop_datanode_3:/hadoop/dfs/data  

  hive-server:
    image: bde2020/hive:2.3.2-postgresql-metastore
    platform: linux/amd64
    container_name: hive-server
    networks:
      - bigdata-net
    depends_on:
      - namenode
      - datanode1
    ports:
      - "10000:10000"
    environment:
      - HIVE_SITE_CONF_hive_metastore_uris=thrift://hive-metastore:9083
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000

  hive-metastore-db:
    image: bde2020/hive-metastore-postgresql:2.3.0
    platform: linux/amd64
    container_name: hive-metastore-db
    networks:
      - bigdata-net
    volumes:
      - db_data:/var/lib/postgresql/data

  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    platform: linux/amd64
    container_name: hive-metastore
    networks:
      - bigdata-net
    depends_on:
      - hive-metastore-db
      - namenode
    command: /opt/hive/bin/hive --service metastore
    environment:
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionDriverName=org.postgresql.Driver
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionURL=jdbc:postgresql://hive-metastore-db:5432/metastore
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionUserName=hive
      - HIVE_SITE_CONF_javax_jdo_option_ConnectionPassword=hive
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000

networks:
  bigdata-net:
    driver: bridge

volumes:
  hadoop_namenode:
  hadoop_datanode_1: 
  hadoop_datanode_2: 
  hadoop_datanode_3: 
  db_data: